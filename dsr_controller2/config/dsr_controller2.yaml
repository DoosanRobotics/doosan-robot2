/**:
  controller_manager:
    ros__parameters:
      update_rate: 10  # Hz

      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster
      
      dsr_moveit_controller:
        type: joint_trajectory_controller/JointTrajectoryController

      dsr_controller2:
        type: dsr_controller2/RobotController

      dsr_position_controller:
        type: forward_command_controller/ForwardCommandController

      robotiq_gripper_controller:
        type: forward_command_controller/ForwardCommandController

  # Controller parameters at the same level as controller_manager
  robotiq_gripper_controller:
    ros__parameters:
      joints: ["robotiq_85_left_knuckle_joint"]
      interface_name: "position"

  dsr_controller2:
    ros__parameters:
      joints:
        - joint_1
        - joint_2
        - joint_3
        - joint_4
        - joint_5
        - joint_6

  dsr_position_controller:
    ros__parameters:
      joints:
        - joint_1
        - joint_2
        - joint_3
        - joint_4
        - joint_5
        - joint_6
      interface_name: position

  dsr_moveit_controller:
    ros__parameters:
      command_interfaces:
        - position
        - velocity
      state_interfaces:
        - position
        - velocity
      joints:
        - joint_1
        - joint_2
        - joint_3
        - joint_4
        - joint_5
        - joint_6