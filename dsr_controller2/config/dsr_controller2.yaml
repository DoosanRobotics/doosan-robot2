/**:
  controller_manager:
    ros__parameters:
      update_rate: 10  # Hz

      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster
      
      dsr_moveit_controller:
        type: joint_trajectory_controller/JointTrajectoryController

      dsr_controller2:
        type: dsr_controller2/RobotController

      dsr_joint_trajectory:
        type: dsr_joint_trajectory/RobotController

      dsr_joint_publisher:
        type: joint_state_controller/JointStateController

      dsr_position_controller:
        type: forward_command_controller/ForwardCommandController

  dsr_controller2:
    ros__parameters:
      joints:
        - joint_1
        - joint_2
        - joint_3
        - joint_4
        - joint_5
        - joint_6

      # [modified]  
      use_rt_topic_pub: true
      rt_topic_ns: "read_data_rt"          # 토픽 네임스페이스 (결과: ~/read_data_rt/<key>)
      rt_timer_ms: 10                      # 주기(ms)
      rt_topic_keys:                       # 발행할 필드 이름(원하는 것만 선택)
        - actual_joint_position
        - external_tcp_force

  dsr_position_controller:
    ros__parameters:
      joints:
        - joint_1
        - joint_2
        - joint_3
        - joint_4
        - joint_5
        - joint_6
      interface_name: position

      # command_interfaces:
      #   - position
      #   - velocity

      # state_interfaces:
      #   - position
      #   - velocity

  dsr_joint_trajectory:
    ros__parameters:
      joints:
        - joint_1
        - joint_2
        - joint_3
        - joint_4
        - joint_5
        - joint_6

      command_interfaces:
        - position
        - velocity

      state_interfaces:
        - position
        - velocity

  dsr_moveit_controller:
    ros__parameters:
      command_interfaces:
        - position
        - velocity
      state_interfaces:
        - position
        - velocity
      joints:
        - joint_1
        - joint_2
        - joint_3
        - joint_4
        - joint_5
        - joint_6

